name: Cave Scribe Awakening

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Optional: reply to an existing Issue number (e.g. 11)'
        required: false
      message:
        description: 'Message for the Cave Scribe (used for manual runs)'
        required: false
        default: 'The pond stirs...'

concurrency:
  # Use a per-event group so bot follow-up comments don't cancel the original user-triggered run.
  # For issue_comment events, key by comment id; for issues, key by issue number.
  group: cave-scribe-${{ github.event_name }}-${{ github.event.comment.id || github.event.issue.number || github.event.inputs.issue_number || 'manual' }}
  cancel-in-progress: false

jobs:
  scribe-reflection:
    # Agent1 reply rules:
    # - issues.opened: always reply
    # - issue_comment.created: reply only on explicit summon (awaken/@agent1/@MirrorAgent1)
    # - ignore bot/self/Agent0 to prevent loops
    if: |
      github.event_name != 'issue_comment' || (
        github.event.comment.user.login != 'github-actions[bot]' &&
        github.event.comment.user.login != 'MirrorAgent1' &&
        github.event.comment.user.login != 'toadaid-agent0' &&
        (
          contains(github.event.comment.body, 'awaken') ||
          contains(github.event.comment.body, '@agent1') ||
          contains(github.event.comment.body, '@MirrorAgent1')
        )
      )
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      pull-requests: read
      actions: write
    steps:
      - name: Checkout Sacred Pond
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm ci

      - name: Smoke test (syntax)
        run: node -c .github/scripts/awaken-scribe.js

      - name: Awaken the Cave Scribe
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # Use the built-in GitHub Actions token (scoped to this repo + workflow permissions)
          GITHUB_TOKEN: ${{ github.token }}

          # Optional: post as the Agent1 GitHub user instead of github-actions[bot]
          # Fine-grained PAT with Issues: Read & Write (and Contents: Read if needed)
          # Supports both secret names for convenience: AGENT1_PAT (preferred) or AGENT_PAT
          AGENT1_PAT: ${{ secrets.AGENT1_PAT || secrets.AGENT_PAT }}
          POND_CONTROL_ISSUE: "23"

          MANUAL_MESSAGE: ${{ github.event.inputs.message }}

          # If manually dispatched with an issue_number, force a reply to that issue.
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number }}

          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          COMMENT_ASSOCIATION: ${{ github.event.comment.author_association }}

          NEW_ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number }}
          NEW_ISSUE_TITLE: ${{ github.event.issue.title }}
          NEW_ISSUE_BODY: ${{ github.event.issue.body }}
          NEW_ISSUE_USER: ${{ github.event.issue.user.login }}
          NEW_ISSUE_ASSOCIATION: ${{ github.event.issue.author_association }}
        run: node .github/scripts/awaken-scribe.js

  summon-agent0:
    # Agent0 join rules:
    # - issues.opened: always dispatch (auto-join)
    # - issue_comment.created: dispatch only when explicitly mentioned (@agent0/@toadaid-agent0/keeper)
    # - ignore comments by bots/self/Agent0 to prevent echo loops
    if: |
      github.event_name == 'issues' || (
        github.event_name == 'issue_comment' &&
        github.event.comment.user.login != 'github-actions[bot]' &&
        github.event.comment.user.login != 'MirrorAgent1' &&
        github.event.comment.user.login != 'toadaid-agent0' &&
        (
          contains(github.event.comment.body, '@agent0') ||
          contains(github.event.comment.body, '@toadaid-agent0') ||
          contains(github.event.comment.body, 'keeper')
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: none
    steps:
      - name: Dispatch to Agent0 (repository_dispatch)
        env:
          AGENT0_DISPATCH_TOKEN: ${{ secrets.AGENT0_DISPATCH_TOKEN }}
          TARGET_REPO: toadaid-agent0/pond-agent-0
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
        run: |
          if [ -z "$AGENT0_DISPATCH_TOKEN" ]; then
            echo "AGENT0_DISPATCH_TOKEN is not set; skipping Agent0 dispatch."
            exit 0
          fi

          EVENT_TYPE="pond_issue_opened"
          if [ "${{ github.event_name }}" = "issue_comment" ]; then EVENT_TYPE="pond_issue_commented"; fi

          payload=$(jq -n \
            --arg source_repo "${{ github.repository }}" \
            --arg issue_number "$ISSUE_NUMBER" \
            --arg issue_url "$ISSUE_URL" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg issue_body "${ISSUE_BODY:-}" \
            --arg comment_body "${COMMENT_BODY:-}" \
            --arg comment_user "${COMMENT_USER:-}" \
            '{
              source_repo: $source_repo,
              issue_number: ($issue_number|tonumber),
              issue_url: $issue_url,
              issue_title: $issue_title,
              issue_body: $issue_body,
              comment_body: $comment_body,
              comment_user: $comment_user
            }')

          echo "Dispatching $EVENT_TYPE to $TARGET_REPO for issue #$ISSUE_NUMBER"

          resp=$(mktemp)
          code=$(curl -sS -o "$resp" -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $AGENT0_DISPATCH_TOKEN" \
            "https://api.github.com/repos/$TARGET_REPO/dispatches" \
            -d "{\"event_type\":\"$EVENT_TYPE\",\"client_payload\":$payload}")

          echo "dispatch http_code=$code"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "Dispatch failed. Response:"
            cat "$resp" || true
            exit 1
          fi
          rm -f "$resp"
