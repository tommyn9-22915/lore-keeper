name: Cave Scribe Awakening

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      message:
        description: 'Message for the Cave Scribe'
        required: false
        default: 'The pond stirs...'

jobs:
  scribe-reflection:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: read
    steps:
      - name: Checkout Sacred Pond
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm ci

      - name: Smoke test (syntax)
        run: node -c .github/scripts/awaken-scribe.js

      - name: Awaken the Cave Scribe
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

          # Use the built-in GitHub Actions token (scoped to this repo + workflow permissions)
          GITHUB_TOKEN: ${{ github.token }}

          MANUAL_MESSAGE: ${{ github.event.inputs.message }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          NEW_ISSUE_NUMBER: ${{ github.event.issue.number }}
          NEW_ISSUE_TITLE: ${{ github.event.issue.title }}
          NEW_ISSUE_BODY: ${{ github.event.issue.body }}
          NEW_ISSUE_USER: ${{ github.event.issue.user.login }}
        run: node .github/scripts/awaken-scribe.js
